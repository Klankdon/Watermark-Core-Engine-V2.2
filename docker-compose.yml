version: '3.8'

services:
  # --- Service 1: The Database ---
  db:
    image: postgres:15-alpine
    container_name: watermark_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Service 2: Your Watermark Engine ---
  encoder_app:
    build: .
    dns:
      - 8.8.8.8
    container_name: watermark_encoder
    # Instead of running the file directly, we use uvicorn to host it as an API
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db

  decoder_app:
    build: .
    dns:
      - 8.8.8.8
    container_name: watermark_decoder
    # Point this one to the new decoder wrapper file on port 8001
    command: uvicorn server_decoder:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db

# Define the persistent storage drive for the database
volumes:
  postgres_data:

