version: '3.8'

name: local-watermark-gpu

services:
  # --- Service 1: Local Database Core ---
  db:
    image: postgres:15-alpine
    container_name: local_watermark_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - local_postgres_data:/var/lib/postgresql/data

  # --- Service 2: GPU Encoder API Engine ---
  encoder_app:
    build: .
    dns:
      - 8.8.8.8
    container_name: local_watermark_encoder
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --- Service 3: GPU Decoder API Engine ---
  decoder_app:
    build: .
    dns:
      - 8.8.8.8
    container_name: local_watermark_decoder
    command: uvicorn server_decoder:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# ... (keep your existing db, encoder_app, and decoder_app services exactly as they are)

  # --- Service 4: Web-Based Database Management GUI ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: local_watermark_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  local_postgres_data:
  pgadmin_data:  # <-- Don't forget to declare the new storage volume at the very bottom!


